name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit and integration tests
        run: pytest
        env:
          # OpenAI smoke test skips without a key; CI must not require secrets.
          OPENAI_API_KEY: ""

      - name: Run deterministic evaluations
        run: pytest tests/evaluations -v

      - name: Ruff
        run: ruff check src tests evaluations

      - name: Black
        run: black --check src tests evaluations
